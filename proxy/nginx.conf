# Reverse proxy in front of the cs16-web container (P3, see docs/PERFORMANCE.md).
#
# Why: the upstream static server (inside the pinned image) serves valve.zip
# (~206 MB) and the content-hashed bundle with NO Cache-Control / ETag, so most
# browsers re-download the whole payload on every repeat visit / hard refresh.
# We can't edit that server, but docker-compose.yml is ours — so this proxy owns
# the public port 27016, forwards to the game container internally, and injects
# proper caching headers. The WebRTC media/data path (27018) is untouched; only
# the page + the same-origin signaling WebSocket (/websocket) flow through here.

events {}

http {
    # Map the Upgrade header so the WebSocket upgrade is passed through verbatim.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 27016;

        # Resolve the game container by name at request time (Docker embedded DNS),
        # so this proxy survives the upstream container being recreated.
        resolver 127.0.0.11 ipv6=off valid=10s;
        set $game "cs16-web:27016";

        # WebRTC signaling WebSocket — the make-or-break path. The client opens
        # ws(s)://<host>/websocket; the upgrade MUST pass through untouched or the
        # game never connects.
        location = /websocket {
            proxy_pass http://$game;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 1h;
            proxy_send_timeout 1h;
        }

        # Content-hashed bundle assets (JS / WASM / CSS / images): the filename
        # changes whenever the content changes, so they are safe to cache forever.
        # Covers the main-*.js bundle AND the multi-MB xash-*.wasm /
        # libref_webgl2-*.wasm modules and the hashed logo/favicon.
        location ~ "^/assets/.+-[A-Za-z0-9_-]{6,}\.(js|wasm|css|png)$" {
            proxy_pass http://$game;
            proxy_set_header Host $host;
            proxy_hide_header Cache-Control;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        # The big game payload. It is NOT content-hashed and its bytes change when
        # start.sh rebuilds it, so the browser must never serve a stale copy.
        # `no-cache` still STORES the body (fixing the root-cause re-download — the
        # in-image server sent no Cache-Control at all, so browsers re-fetched all
        # of it) but forces a conditional GET each load: the upstream Last-Modified
        # (which changes on rebuild) yields a cheap 304 when unchanged and a fresh
        # 200 immediately after a rebuild. A long max-age would instead serve the
        # old zip for hours after a rebuild. Stream it (buffering off) so nginx
        # doesn't spool the whole file to disk.
        location = /valve.zip {
            proxy_pass http://$game;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_hide_header Cache-Control;
            add_header Cache-Control "public, no-cache" always;
        }

        # index.html and everything else: store but always revalidate, so patched
        # client changes deploy promptly. The only WebSocket path is /websocket
        # (handled above), so no upgrade headers here — this avoids forcing
        # Connection: close on every normal request.
        location / {
            proxy_pass http://$game;
            proxy_set_header Host $host;
            proxy_hide_header Cache-Control;
            add_header Cache-Control "no-cache" always;
        }
    }
}

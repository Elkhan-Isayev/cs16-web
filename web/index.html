<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/assets/favicon-DRK6xunG.png" type="image/png">

    <title>Loading</title>

    <script>
        // Swallow the Escape key before it reaches the WASM engine.
        // In this web build the engine's in-game menu renders as a black
        // screen (its TTF fonts are missing), so opening it is useless.
        // A capture-phase listener on window fires before the engine's
        // document/canvas handlers, so the engine never sees Escape.
        // The browser still releases the mouse pointer-lock, which we turn
        // into something useful: it reveals our own map-picker (see below).
        window.addEventListener('keydown', function (e) {
            if (e.key === 'Escape' || e.code === 'Escape' || e.keyCode === 27) {
                e.stopImmediatePropagation();
                e.preventDefault();
            }
        }, true);
    </script>

    <script>
        // ---- In-browser map picker ----
        // The engine's bundle rebuilds <body> (via innerHTML), which silently
        // drops any <script> placed there. So the picker lives in <head>, builds
        // its own DOM with inline styles, and re-injects itself if the body gets
        // wiped. It switches the server map for everyone via `rcon changelevel`,
        // calling the engine instance that web/main.js exposes on window.__xash.
        (function () {
            // Must match rcon_password in cstrike/server.cfg. Public on a LAN by design.
            var RCON_PW = 'cs16lan';
            var MAPS = [
                'de_dust2', 'de_dust', 'de_inferno', 'de_nuke', 'de_train',
                'de_aztec', 'de_cbble', 'de_chateau', 'de_prodigy', 'de_vertigo',
                'de_airstrip', 'de_piranesi', 'de_storm', 'de_survivor', 'de_torn',
                'cs_assault', 'cs_italy', 'cs_office', 'cs_militia', 'cs_havana',
                'cs_estate', 'cs_backalley', 'cs_siege', 'cs_747', 'as_oilrig'
            ];
            var CUSTOM = ['cs_mansion']; // non-stock maps added via ./add-maps.sh

            function css(el, s) { for (var k in s) el.style[k] = s[k]; }

            function switchMap(name) {
                var x = window.__xash;
                if (x && x.Cmd_ExecuteString) {
                    x.Cmd_ExecuteString('rcon_password ' + RCON_PW);
                    x.Cmd_ExecuteString('rcon changelevel ' + name);
                }
                var o = document.getElementById('cs-mapmenu');
                if (o) o.style.display = 'none';
            }

            function build() {
                if (!document.body || document.getElementById('cs-mapbtn')) return;

                var btn = document.createElement('button');
                btn.id = 'cs-mapbtn';
                btn.textContent = '🗺 Maps';
                css(btn, { position: 'fixed', top: '10px', left: '50%', transform: 'translateX(-50%)',
                    zIndex: 2147483646, display: 'none', padding: '7px 16px', background: '#000000cc',
                    color: '#f6b265', border: '1px solid #f6b265', borderRadius: '8px',
                    font: '600 14px Arial, sans-serif', cursor: 'pointer' });

                var overlay = document.createElement('div');
                overlay.id = 'cs-mapmenu';
                css(overlay, { position: 'fixed', inset: '0', zIndex: 2147483647, display: 'none',
                    alignItems: 'center', justifyContent: 'center', background: 'rgba(0,0,0,.6)',
                    fontFamily: 'Arial, Helvetica, sans-serif' });

                var panel = document.createElement('div');
                css(panel, { background: '#1b1b1bf2', border: '1px solid #f6b265', borderRadius: '10px',
                    padding: '20px 22px', width: '90%', maxWidth: '820px', maxHeight: '82vh',
                    overflow: 'auto', boxShadow: '0 10px 50px #000' });
                panel.innerHTML =
                    '<h2 style="color:#f6b265;margin:0 0 4px;font-size:19px">🗺 Choose a map</h2>' +
                    '<p style="color:#aaa;margin:0 0 16px;font-size:12.5px">Switches the map for ' +
                    '<b>everyone</b> on the server (takes a few seconds). Click the game afterwards ' +
                    'to lock the mouse and keep playing.</p>';

                var gridEl = document.createElement('div');
                css(gridEl, { display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(125px,1fr))', gap: '8px' });

                function mkMap(name, isCustom) {
                    var m = document.createElement('button');
                    m.textContent = name;
                    var base = isCustom ? '#f6b265' : '#eee';
                    css(m, { background: '#2a2a2a', color: base, border: '1px solid ' + (isCustom ? '#f6b265' : '#444'),
                        borderRadius: '6px', padding: '10px 6px', cursor: 'pointer', fontSize: '13px' });
                    m.onmouseover = function () { m.style.background = '#f6b265'; m.style.color = '#111'; };
                    m.onmouseout = function () { m.style.background = '#2a2a2a'; m.style.color = base; };
                    m.onclick = function () { switchMap(name); };
                    gridEl.appendChild(m);
                }
                CUSTOM.forEach(function (n) { mkMap(n, true); });
                MAPS.forEach(function (n) { mkMap(n, false); });

                var close = document.createElement('button');
                close.textContent = 'Close';
                css(close, { marginTop: '16px', background: 'none', border: 'none', color: '#999',
                    cursor: 'pointer', fontSize: '12px', textDecoration: 'underline' });
                close.onclick = function () { overlay.style.display = 'none'; };

                panel.appendChild(gridEl);
                panel.appendChild(close);
                overlay.appendChild(panel);
                btn.onclick = function () { overlay.style.display = 'flex'; };

                document.body.appendChild(btn);
                document.body.appendChild(overlay);
            }

            function tick() {
                build(); // re-inject if the engine wiped <body>
                var btn = document.getElementById('cs-mapbtn');
                if (!btn) return;
                var running = !!(window.__xash && window.__xash.running);
                var free = !document.pointerLockElement;
                // The button is only useful when the game is running and the mouse
                // is free (it can't be clicked while pointer-locked anyway).
                btn.style.display = (running && free) ? 'block' : 'none';
                if (!free) { var o = document.getElementById('cs-mapmenu'); if (o) o.style.display = 'none'; }
            }

            document.addEventListener('pointerlockchange', tick, false);
            setInterval(tick, 800);
            if (document.readyState !== 'loading') build();
            else document.addEventListener('DOMContentLoaded', build);
        })();
    </script>

    <style>
        body {

            margin: 0;
        }

        .notDraggable {
            user-select: none;
            -webkit-user-drag: none;
            pointer-events: none;
        }

        @keyframes pulsate {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0.75;
            }
        }

        @keyframes pulsate-end {
            0% {
                transform: translate(-50%, -50%) scale(0.75);
                opacity: 0.87;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
        }

        img {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 100vw;
            max-height: 100vh;
            animation-name: pulsate;
            animation-duration: 0.75s;
            animation-iteration-count: infinite;
            animation-direction: alternate;
            z-index: 2;
            transition: opacity ease-in-out 0.5s;
        }

        canvas {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        form {
            margin: 0;
            padding: 16px;
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 8px;
            color: white;
        }

        form > div {
            display: flex;
            justify-content: space-between;
        }

        #warning {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 3;
            text-align: center;
            color: red;
            opacity: 0;
            transition: opacity ease-in-out 0.5s;
        }

        progress {
            border-radius: 1px;
            overflow: hidden;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            width: 100%;
            height: 8px;
            pointer-events: none;
            transition: opacity 0.5s ease-in-out;
        }

        progress::-webkit-progress-bar {
            background-color: #eee;
        }

        progress::-webkit-progress-value {
            background-color: #f6b265;
        }

        progress::-moz-progress-bar {
            background-color: #f6b265;
        }

        #social {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 12px
        }

        .github {
            width: 24px;
            height: auto;
        }

        .discord {
            width: 24px;
            height: auto;
        }

        audio {
            display: none;
        }
    </style>

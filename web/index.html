<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/assets/favicon-DRK6xunG.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0d0d0d">
    <meta name="description" content="Play Counter-Strike 1.6 right in your browser — no install. Pick a name and hit Start.">

    <title>Counter-Strike 1.6 — Play in your browser</title>

    <script>
        // Swallow the Escape key before it reaches the WASM engine.
        // In this web build the engine's in-game menu renders as a black
        // screen (its TTF fonts are missing), so opening it is useless.
        // A capture-phase listener on window fires before the engine's
        // document/canvas handlers, so the engine never sees Escape.
        // ONE exception: if our own map picker is open, Escape closes it
        // (and we still swallow the key from the engine).
        window.addEventListener('keydown', function (e) {
            if (e.key === 'Escape' || e.code === 'Escape' || e.keyCode === 27) {
                var menu = document.getElementById('cs-mapmenu');
                if (menu && menu.style.display === 'flex' && typeof window.__csMapClose === 'function') {
                    window.__csMapClose();
                }
                e.stopImmediatePropagation();
                e.preventDefault();
            }
        }, true);
    </script>

    <script>
        // ---- In-browser map picker ----
        // Lives in <head> and self-heals (re-injects on a tick) so it survives
        // any rebuild of <body>. Switches the server map for everyone via
        // `rcon changelevel`, calling the engine instance web/main.js exposes on
        // window.__xash. Selection + switching state live on `window` so they
        // survive a re-inject. Simple UX: instant search, current-map highlight,
        // "switching…" feedback, Esc / backdrop / ✕ to close, touch-friendly.
        (function () {
            // Must match rcon_password in cstrike/server.cfg. Public on a LAN by design.
            var RCON_PW = 'cs16lan';
            var MAPS = [
                'de_dust2', 'de_dust', 'de_inferno', 'de_nuke', 'de_train',
                'de_aztec', 'de_cbble', 'de_chateau', 'de_prodigy', 'de_vertigo',
                'de_airstrip', 'de_piranesi', 'de_storm', 'de_survivor', 'de_torn',
                'cs_assault', 'cs_italy', 'cs_office', 'cs_militia', 'cs_havana',
                'cs_estate', 'cs_backalley', 'cs_siege', 'cs_747', 'as_oilrig'
            ];
            var CUSTOM = ['cs_mansion']; // non-stock maps added via ./add-maps.sh

            function css(el, s) { for (var k in s) el.style[k] = s[k]; }
            function tiles() { return document.querySelectorAll('#cs-mapgrid .cs-maptile'); }

            function closePicker() {
                var o = document.getElementById('cs-mapmenu');
                if (o) o.style.display = 'none';
                var b = document.getElementById('cs-mapbtn');
                if (b) { try { b.focus(); } catch (e) {} }
            }
            window.__csMapClose = closePicker;

            // Highlight the currently-/last-selected map; reset the rest.
            function applyHighlight() {
                var sel = window.__csSelectedMap, t = tiles();
                for (var i = 0; i < t.length; i++) {
                    var el = t[i], name = el.getAttribute('data-map'), custom = el.getAttribute('data-custom') === '1';
                    if (name === sel) {
                        css(el, { background: '#3a3320', color: '#f6b265', borderColor: '#f6b265' });
                        el.textContent = '✓ ' + name;
                    } else {
                        css(el, { background: '#2a2a2a', color: custom ? '#f6b265' : '#eee', borderColor: custom ? '#f6b265' : '#3a3a3a' });
                        el.textContent = name;
                    }
                }
            }

            function setSwitching(on) {
                var t = tiles();
                for (var i = 0; i < t.length; i++) {
                    t[i].disabled = on; t[i].style.opacity = on ? '.45' : '1'; t[i].style.pointerEvents = on ? 'none' : 'auto';
                }
                var s = document.getElementById('cs-mapsearch'); if (s) s.disabled = on;
            }

            function switchMap(name) {
                if (window.__csSwitching) return; // guard against double-fire
                window.__csSelectedMap = name;
                applyHighlight();
                var x = window.__xash;
                if (x && x.Cmd_ExecuteString) {
                    x.Cmd_ExecuteString('rcon_password ' + RCON_PW);
                    x.Cmd_ExecuteString('rcon changelevel ' + name);
                }
                window.__csSwitching = true;
                setSwitching(true);
                var status = document.getElementById('cs-mapstatus');
                if (status) { status.textContent = 'Switching to ' + name + '…  (takes a few seconds)'; status.style.display = 'block'; }
                setTimeout(function () {
                    window.__csSwitching = false;
                    setSwitching(false);
                    var st = document.getElementById('cs-mapstatus'); if (st) st.style.display = 'none';
                    closePicker();
                }, 4000);
            }

            function filterMaps() {
                var s = document.getElementById('cs-mapsearch');
                var q = s ? s.value.toLowerCase().trim() : '';
                var t = tiles(), visible = 0;
                for (var i = 0; i < t.length; i++) {
                    var show = t[i].getAttribute('data-map').indexOf(q) > -1;
                    t[i].style.display = show ? '' : 'none';
                    if (show) visible++;
                }
                var none = document.getElementById('cs-mapnone'); if (none) none.style.display = visible ? 'none' : 'block';
            }

            function openPicker() {
                var o = document.getElementById('cs-mapmenu');
                if (!o) return;
                o.style.display = 'flex';
                if (document.exitPointerLock) { try { document.exitPointerLock(); } catch (e) {} }
                setTimeout(function () {
                    var s = document.getElementById('cs-mapsearch');
                    if (s) { s.value = ''; filterMaps(); try { s.focus(); } catch (e) {} }
                }, 0);
            }

            function build() {
                if (!document.body || document.getElementById('cs-mapbtn')) return;

                var btn = document.createElement('button');
                btn.id = 'cs-mapbtn';
                btn.textContent = 'Maps';
                btn.title = 'Choose a map';
                btn.setAttribute('aria-haspopup', 'dialog');
                css(btn, { position: 'fixed', top: '10px', left: '50%', transform: 'translateX(-50%)',
                    zIndex: 2147483646, display: 'none', padding: '8px 18px', background: '#000000cc',
                    color: '#f6b265', border: '1px solid #f6b265', borderRadius: '999px',
                    font: '600 13px Arial, sans-serif', letterSpacing: '.3px', cursor: 'pointer' });
                btn.onclick = openPicker;

                var overlay = document.createElement('div');
                overlay.id = 'cs-mapmenu';
                css(overlay, { position: 'fixed', inset: '0', zIndex: 2147483647, display: 'none',
                    alignItems: 'center', justifyContent: 'center', background: 'rgba(0,0,0,.6)',
                    fontFamily: 'Arial, Helvetica, sans-serif' });
                overlay.onclick = function (e) { if (e.target === overlay) closePicker(); };

                var panel = document.createElement('div');
                panel.setAttribute('role', 'dialog');
                panel.setAttribute('aria-modal', 'true');
                panel.setAttribute('aria-label', 'Choose a map');
                panel.tabIndex = -1;
                css(panel, { background: '#1b1b1bf2', border: '1px solid #f6b265', borderRadius: '12px',
                    padding: '18px 20px', width: '92%', maxWidth: '640px', maxHeight: '82vh',
                    overflow: 'auto', boxShadow: '0 12px 50px #000', boxSizing: 'border-box' });

                var header = document.createElement('div');
                css(header, { display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '6px' });
                var h = document.createElement('h2');
                h.textContent = 'Choose a map';
                css(h, { color: '#f6b265', margin: '0', fontSize: '18px', fontWeight: '700' });
                var x = document.createElement('button');
                x.textContent = '✕';
                x.setAttribute('aria-label', 'Close');
                css(x, { background: 'none', border: 'none', color: '#999', fontSize: '20px', lineHeight: '1',
                    cursor: 'pointer', padding: '2px 6px' });
                x.onmouseover = function () { x.style.color = '#f6b265'; };
                x.onmouseout = function () { x.style.color = '#999'; };
                x.onclick = closePicker;
                header.appendChild(h);
                header.appendChild(x);

                var sub = document.createElement('p');
                sub.textContent = 'Pick a map to switch the whole server. It takes a few seconds — then tap the game to keep playing.';
                css(sub, { color: '#aaa', margin: '0 0 14px', fontSize: '12.5px', lineHeight: '1.5' });

                var search = document.createElement('input');
                search.id = 'cs-mapsearch';
                search.type = 'text';
                search.placeholder = 'Search maps…';
                search.autocomplete = 'off';
                search.spellcheck = false;
                search.setAttribute('aria-label', 'Search maps');
                css(search, { width: '100%', boxSizing: 'border-box', margin: '0 0 14px', padding: '10px 12px',
                    background: '#111', color: '#fff', border: '1px solid #444', borderRadius: '8px',
                    font: '14px Arial, sans-serif', outline: 'none' });
                search.onfocus = function () { search.style.borderColor = '#f6b265'; };
                search.onblur = function () { search.style.borderColor = '#444'; };
                search.oninput = filterMaps;
                search.onkeydown = function (e) {
                    if (e.key === 'Enter') {
                        var vis = [], t = tiles();
                        for (var i = 0; i < t.length; i++) if (t[i].style.display !== 'none') vis.push(t[i]);
                        if (vis.length === 1) vis[0].click();
                    }
                };

                var status = document.createElement('div');
                status.id = 'cs-mapstatus';
                css(status, { display: 'none', color: '#f6b265', font: '600 14px Arial, sans-serif', padding: '2px 2px 12px' });

                var gridEl = document.createElement('div');
                gridEl.id = 'cs-mapgrid';
                css(gridEl, { display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(140px,1fr))', gap: '8px' });

                function mkMap(name, isCustom) {
                    var m = document.createElement('button');
                    m.className = 'cs-maptile';
                    m.textContent = name;
                    m.setAttribute('data-map', name);
                    m.setAttribute('data-custom', isCustom ? '1' : '0');
                    css(m, { background: '#2a2a2a', color: isCustom ? '#f6b265' : '#eee',
                        border: '1px solid ' + (isCustom ? '#f6b265' : '#3a3a3a'),
                        borderRadius: '8px', padding: '11px 8px', cursor: 'pointer', fontSize: '13px',
                        transition: 'background .12s, border-color .12s' });
                    m.onmouseover = function () {
                        if (m.getAttribute('data-map') !== window.__csSelectedMap) { m.style.background = '#383838'; m.style.borderColor = '#f6b265'; }
                    };
                    m.onmouseout = function () { applyHighlight(); };
                    m.onclick = function () { switchMap(name); };
                    gridEl.appendChild(m);
                }
                CUSTOM.forEach(function (n) { mkMap(n, true); });
                MAPS.forEach(function (n) { mkMap(n, false); });

                var none = document.createElement('div');
                none.id = 'cs-mapnone';
                none.textContent = 'No maps match your search.';
                css(none, { display: 'none', color: '#888', fontSize: '13px', padding: '8px 2px' });

                panel.appendChild(header);
                panel.appendChild(sub);
                panel.appendChild(search);
                panel.appendChild(status);
                panel.appendChild(gridEl);
                panel.appendChild(none);
                overlay.appendChild(panel);

                document.body.appendChild(btn);
                document.body.appendChild(overlay);
                applyHighlight();
            }

            function tick() {
                build(); // re-inject if the engine wiped <body>
                var btn = document.getElementById('cs-mapbtn');
                if (!btn) return;
                var running = !!(window.__xash && window.__xash.running);
                var free = !document.pointerLockElement;
                // Show the button when the game is running and the mouse is free.
                // On desktop the player presses Esc (released pointer-lock) to reach
                // it; on touch there is no pointer-lock so `free` is always true and
                // the button is simply available while playing.
                btn.style.display = (running && free) ? 'block' : 'none';
            }

            document.addEventListener('pointerlockchange', tick, false);
            setInterval(tick, 800);
            if (document.readyState !== 'loading') build();
            else document.addEventListener('DOMContentLoaded', build);
        })();
    </script>

    <script>
        // ---- Loading percentage + unpack phase ----
        // The engine drives the thin <progress id="progress"> bar while it
        // downloads valve.zip, then (with the bar already hidden) single-threaded
        // unzips it into an in-RAM filesystem with no progress of its own. We mirror
        // the bar into a readable % and fill that silent unpack gap with a caption,
        // so the user is never left staring at a frozen logo. We poll because the
        // engine sets progress.value directly (no event).
        (function () {
            var done = false, ticks = 0, unpackStart = 0;
            var id = setInterval(function () {
                var bar = document.getElementById('progress');
                var txt = document.getElementById('cs-loadtext');
                var pct = document.getElementById('cs-loadpct');
                if (!bar || !txt || !pct) return;
                ticks++;

                // The engine zeroes the bar's opacity the moment the DOWNLOAD finishes
                // — but the heavy unzip runs after that with no signal. So while the
                // download is done but the engine isn't running yet, show the unpack
                // phase instead of going blank.
                if (bar.style.opacity === '0') {
                    var running = !!(window.__xash && window.__xash.running);
                    if (running) {
                        txt.style.opacity = '0';
                        if (!done) { done = true; clearInterval(id); }
                        return;
                    }
                    if (!unpackStart) unpackStart = Date.now();
                    // Cap it: after a generous unpack window the Start card is up, so stop.
                    if (Date.now() - unpackStart > 25000) {
                        txt.style.opacity = '0';
                        if (!done) { done = true; clearInterval(id); }
                        return;
                    }
                    var hint = document.getElementById('cs-loadhint');
                    pct.textContent = 'Unpacking…';
                    if (hint) hint.textContent = 'Unpacking game files — almost there';
                    txt.style.opacity = '1';
                    return;
                }

                var max = bar.max || 1;
                var ratio = max > 0 ? bar.value / max : 0;
                // If the server omits Content-Length the engine stores raw byte
                // counts (>1); we can't show a real %, so fall back to a dash.
                if (ratio > 1.0001) pct.textContent = '…';
                else pct.textContent = Math.round(Math.min(ratio, 1) * 100) + '%';

                // Reveal only once the download has genuinely been running for a
                // moment (~600ms), so an instant cached load never flashes the caption.
                if (ticks >= 3) txt.style.opacity = '1';
            }, 200);
        })();
    </script>

    <script>
        // ---- Connection / stuck-load watchdog ----
        // Every failure mode in this build looks identical to the player: the logo
        // pulsates forever with no feedback (WebRTC blocked by a firewall or AP
        // isolation, a wrong host IP, the server down, assets that never start).
        // This head-resident, self-healing panel surfaces a hint once the load has
        // clearly stalled. It auto-hides the instant the engine starts
        // (window.__xash.running) or the download completes, so a slow but still-
        // progressing first load never triggers it.
        (function () {
            var STALL_MS = 12000;    // no forward progress for this long ...
            var MIN_WAIT_MS = 25000; // ... and at least this long since page load
            var start = Date.now();
            var lastValue = -1, lastAdvance = start, dismissed = false;

            function css(el, s) { for (var k in s) el.style[k] = s[k]; }

            function build() {
                if (!document.body || document.getElementById('cs-trouble')) return;

                var overlay = document.createElement('div');
                overlay.id = 'cs-trouble';
                css(overlay, { position: 'fixed', inset: '0', zIndex: 2147483640,
                    display: 'none', alignItems: 'center', justifyContent: 'center',
                    background: 'rgba(0,0,0,.78)', fontFamily: 'Arial, Helvetica, sans-serif' });

                var panel = document.createElement('div');
                css(panel, { background: '#1b1b1bf2', border: '1px solid #f6b265',
                    borderRadius: '12px', padding: '22px 24px', width: '90%', maxWidth: '460px',
                    boxShadow: '0 10px 50px #000', color: '#ddd', boxSizing: 'border-box' });
                panel.innerHTML =
                    '<h2 style="color:#f6b265;margin:0 0 6px;font-size:19px">Still connecting&hellip;</h2>' +
                    '<p style="color:#aaa;margin:0 0 12px;font-size:13px">This is taking longer than ' +
                    'usual. If it stays stuck, check:</p>' +
                    '<ul style="margin:0 0 16px;padding-left:18px;font-size:13px;line-height:1.7">' +
                    '<li>You&rsquo;re on the <b>same Wi-Fi / LAN</b> as the host</li>' +
                    '<li>The host firewall allows ports <b>27016</b> &amp; <b>27018</b></li>' +
                    '<li>Guest / AP isolation is <b>off</b> on the Wi-Fi</li>' +
                    '<li>Try allowing <b>microphone</b> access, then retry</li>' +
                    '</ul>';

                var retry = document.createElement('button');
                retry.textContent = 'Retry';
                css(retry, { background: '#f6b265', color: '#101010', border: 'none',
                    borderRadius: '8px', padding: '10px 22px', cursor: 'pointer',
                    font: '700 14px Arial, sans-serif' });
                retry.onclick = function () { location.reload(); };

                var hide = document.createElement('button');
                hide.textContent = 'Hide';
                css(hide, { marginLeft: '14px', background: 'none', border: 'none',
                    color: '#999', cursor: 'pointer', fontSize: '12px', textDecoration: 'underline' });
                hide.onclick = function () { dismissed = true; overlay.style.display = 'none'; };

                panel.appendChild(retry);
                panel.appendChild(hide);
                overlay.appendChild(panel);
                document.body.appendChild(overlay);
            }

            function tick() {
                build(); // re-inject if the engine wiped <body>
                var overlay = document.getElementById('cs-trouble');
                if (!overlay) return;

                var bar = document.getElementById('progress');
                var running = !!(window.__xash && window.__xash.running);
                // The engine sets #progress opacity to 0 the moment assets are ready.
                var complete = !!(bar && bar.style.opacity === '0');

                // Healthy: engine started or the download finished — never nag.
                if (running || complete) { overlay.style.display = 'none'; return; }

                // Is the download still moving forward? (Reset the stall clock if so.)
                var v = bar ? Number(bar.value) || 0 : 0;
                if (v > lastValue) { lastValue = v; lastAdvance = Date.now(); }

                if (dismissed) { overlay.style.display = 'none'; return; }

                var now = Date.now();
                // Show only after a real wait AND no forward progress for a while.
                var stalled = (now - start >= MIN_WAIT_MS) && (now - lastAdvance >= STALL_MS);
                overlay.style.display = stalled ? 'flex' : 'none';
            }

            setInterval(tick, 1000);
            if (document.readyState !== 'loading') build();
            else document.addEventListener('DOMContentLoaded', build);
        })();
    </script>

    <style>
        :root {
            --accent: #f6b265;
            --accent-press: #e8a24f;
            --ink: #0d0d0d;        /* page background */
            --panel: #161616;      /* card background */
            --panel-bd: #2a2a2a;   /* hairline border */
            --text: #f2f2f2;       /* primary text */
            --text-dim: #9aa0a6;   /* secondary text */
            --radius: 12px;
            --ui-font: -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
        }

        body {
            background: var(--ink);
            margin: 0;
        }

        .notDraggable {
            user-select: none;
            -webkit-user-drag: none;
            pointer-events: none;
        }

        @keyframes pulsate {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0.75;
            }
        }

        @keyframes pulsate-end {
            0% {
                transform: translate(-50%, -50%) scale(0.75);
                opacity: 0.87;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
        }

        /* #logo — the breathing loading mark. Keep the animation/keyframes exactly:
           the engine flips animationName to 'pulsate-end' (inline) when assets are
           ready, and inline styles win over this rule. */
        img {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 70vw;
            max-height: 60vh;
            animation-name: pulsate;
            animation-duration: 0.75s;
            animation-iteration-count: infinite;
            animation-direction: alternate;
            z-index: 2;
            transition: opacity ease-in-out 0.5s;
            filter: drop-shadow(0 0 24px rgba(0, 0, 0, 0.6));
        }

        canvas {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Join card — the first impression. Bottom-centered so it never covers the
           loading logo/caption; the player can type their name while the game loads.
           The engine reads #username and #touchControls and sets display:none on the
           #form on submit, so we lay it out with transform (not display). */
        form {
            margin: 0;
            padding: 20px 22px;
            box-sizing: border-box;
            position: fixed;
            left: 50%;
            bottom: 28px;
            transform: translateX(-50%);
            z-index: 4;
            width: min(92vw, 360px);
            display: flex;
            flex-direction: column;
            gap: 13px;
            background: var(--panel);
            border: 1px solid var(--panel-bd);
            border-radius: var(--radius);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.55);
            color: var(--text);
            font-family: var(--ui-font);
        }

        .cs-card-title {
            margin: 0;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0.2px;
            color: var(--text);
            text-align: center;
        }

        .cs-card-sub {
            margin: 0;
            font-size: 13px;
            line-height: 1.5;
            color: var(--text-dim);
            text-align: center;
        }

        .cs-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 13px;
            color: var(--text-dim);
        }

        .cs-field > span {
            font-weight: 600;
        }

        #username {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 14px;
            background: #101010;
            color: var(--text);
            border: 1px solid var(--panel-bd);
            border-radius: 10px;
            font-size: 16px; /* 16px avoids iOS zoom-on-focus */
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        #username::placeholder {
            color: #5f6368;
        }

        #username:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(246, 178, 101, 0.18);
        }

        .cs-start {
            width: 100%;
            padding: 13px 16px;
            background: var(--accent);
            color: #101010;
            border: none;
            border-radius: 10px;
            font: 700 16px var(--ui-font);
            cursor: pointer;
            transition: background 0.15s ease, transform 0.05s ease;
        }

        .cs-start:hover { background: var(--accent-press); }
        .cs-start:active { transform: translateY(1px); }
        .cs-start:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }

        .cs-touch {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 12.5px;
            color: var(--text-dim);
            cursor: pointer;
        }

        .cs-touch input {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
            cursor: pointer;
            margin: 0;
        }

        .cs-touch em {
            color: #6b7075;
            font-style: normal;
        }

        /* Mic note — calm, optional, NOT an alarming red error. The engine toggles
           it via inline opacity (0 ↔ 1) after a mic-access timeout, so we keep the
           opacity:0 default and only style the resting look. Shown in-game, by which
           point the join card is hidden, so they share the bottom slot. */
        #warning {
            position: fixed;
            left: 50%;
            bottom: 28px;
            transform: translateX(-50%);
            z-index: 4;
            text-align: center;
            width: min(92vw, 360px);
            box-sizing: border-box;
            margin: 0;
            padding: 10px 14px;
            background: rgba(246, 178, 101, 0.10);
            border: 1px solid rgba(246, 178, 101, 0.35);
            border-radius: 10px;
            color: #d9c39e;
            font-size: 12.5px;
            line-height: 1.45;
            font-family: var(--ui-font);
            opacity: 0;
            transition: opacity ease-in-out 0.5s;
        }

        progress {
            border-radius: 1px;
            overflow: hidden;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            width: 100%;
            height: 6px;
            pointer-events: none;
            transition: opacity 0.5s ease-in-out;

        #cs-loadtext {

            left: 50%;
            transform: translate(-50%, calc(-50% + 120px));
            z-index: 2;
            text-align: center;
            font-family: var(--ui-font);
            font-size: 13px;
            line-height: 1.5;

            transition: opacity 0.5s ease-in-out;

            display: block;
            color: var(--accent);
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.3px;
            font-variant-numeric: tabular-nums; /* stops the percent jittering */
        }

        #cs-loadhint {
            color: var(--text-dim);
            font-size: 12.5px;
        }

        #social {

        .github { width: 22px; height: auto; }
        .discord { width: 22px; height: auto; }

        audio { display: none; }

name: cs16-web

services:
  cs16-web:
    # Pinned by digest: the patched web client (web/main.js, web/index.html)
    # references this image's hashed asset filenames. If you bump the image,
    # re-run ./prepare-client.sh to regenerate the patched client.
    image: yohimik/cs-web-server@sha256:ce01d36559ae78446baed1032252b87ee9ec639e4f2f2cdbbdcf75d75359a699
    container_name: cs16-web
    restart: unless-stopped
    platform: linux/386
    command: ["+map", "de_dust2", "+maxplayers", "16"]
    environment:
      PORT: 27018
      IP: 192.168.1.201
    volumes:
      - "./valve.zip:/xashds/public/valve.zip"
      # patched in-browser client: map picker + Esc fix + exposed engine handle
      - "./web/index.html:/xashds/public/index.html"
      - "./web/main.js:/xashds/public/assets/main-Sj92UznW.js"
      # server config: full-money arsenal + rcon for the map picker
      - "./cstrike/server.cfg:/xashds/cstrike/server.cfg"
      # custom maps (server side; clients get them from valve.zip)
      - "./custom-maps/cs_mansion.bsp:/xashds/cstrike/maps/cs_mansion.bsp"
    # 27016 (HTTP page + WebRTC signaling) is published by the proxy below, not
    # here — the proxy injects caching headers. WebRTC media stays direct on 27018.
    expose:
      - "27016"
    ports:
      - "27018:27018"
      - "27018:27018/udp"

  # Reverse proxy: owns public 27016, adds Cache-Control headers the in-image
  # server can't, and passes the /websocket signaling upgrade through. See
  # proxy/nginx.conf + docs/PERFORMANCE.md.
  proxy:
    image: nginx:1.29.1-alpine
    container_name: cs16-proxy
    restart: unless-stopped
    depends_on:
      - cs16-web
    ports:
      - "27016:27016"
    volumes:
      - "./proxy/nginx.conf:/etc/nginx/nginx.conf:ro"
